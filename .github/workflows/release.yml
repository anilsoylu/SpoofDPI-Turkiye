name: release

# v* etiketi push edildiginde GoReleaser ile darwin arm64 + x86_64 tar.gz uretir
# ve GitHub Release'e yukler. Sonra install.sh / uninstall.sh bunlari indirebilir.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest # darwin binary'leri CGO_ENABLED=0 ile cross-compile edilir
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
